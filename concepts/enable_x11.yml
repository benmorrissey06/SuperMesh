- name: Enable X11 Forwarding for Camera Previews
  hosts: all
  become: yes
  tasks:
    - name: Ensure X11 and XCB dependencies are installed
      apt:
        name:
          - xauth
          - x11-apps
          - libxcb1
          - libxcb-icccm4
          - libxcb-image0
          - libxcb-keysyms1
          - libxcb-randr0
          - libxcb-render-util0
          - libxcb-xinerama0
          - libxcb-xinput0
          - libxcb-xfixes0
          - libxkbcommon-x11-0
          - libgl1
          - libglib2.0-0
        state: present
        update_cache: yes

    - name: Configure SSH for X11 Forwarding
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?{{ item.key }}"
        line: "{{ item.key }} {{ item.value }}"
      loop:
        - { key: "X11Forwarding",    value: "yes" }
        - { key: "X11DisplayOffset", value: "10"  }
        - { key: "X11UseLocalhost",  value: "yes" }
      notify: Restart SSH

    - name: Ensure DISPLAY is exported when activating venv
      lineinfile:
        path: /home/l42i/tracking_venv/bin/activate
        line: 'export DISPLAY="${DISPLAY:-localhost:10.0}"'
        insertafter: EOF

  handlers:
    - name: Restart SSH
      service:
        name: ssh
        state: restarted