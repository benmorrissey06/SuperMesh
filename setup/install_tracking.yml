---
# install_tracking.yml
# Installs all SuperMesh node dependencies on every Beelink.
# Run from your Mac: ansible-playbook -i config/bees.ini setup/install_tracking.yml -K
#
# NOTE: We skip Intel's librealsense apt repo — it returns 403 on Ubuntu "questing".
# The pip package pyrealsense2 bundles its own native libs and is all we need.

- name: Install SuperMesh tracking dependencies on Beelink nodes
  hosts: bees
  become: true

  vars:
    venv_path: "/home/{{ ansible_user }}/tracking_venv"
    repo_path:  "/home/{{ ansible_user }}/SuperMesh"
    yolo_model: "yolov8n.pt"

  tasks:

    # ------------------------------------------------------------------
    # SYSTEM PACKAGES
    # libusb-1.0-0 is the only system dep pyrealsense2 needs
    # ------------------------------------------------------------------
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install system dependencies
      apt:
        name:
          - git
          - python3-pip
          - python3-venv
          - libusb-1.0-0
          - v4l-utils
        state: present

    # ------------------------------------------------------------------
    # PYTHON VIRTUAL ENVIRONMENT
    # ------------------------------------------------------------------
    - name: Create tracking_venv
      become: false
      command: python3 -m venv {{ venv_path }}
      args:
        creates: "{{ venv_path }}/bin/activate"

    - name: Upgrade pip inside venv
      become: false
      pip:
        name: pip
        state: latest
        virtualenv: "{{ venv_path }}"

    # ------------------------------------------------------------------
    # PYTHON PACKAGES
    # ultralytics pulls torch + torchvision — takes a few minutes.
    # opencv-contrib-python includes ArUco/ChArUco modules.
    # pyrealsense2 from pip bundles the native RealSense lib — no apt repo needed.
    # ------------------------------------------------------------------
    - name: Install Python packages into venv
      become: false
      pip:
        name:
          - "numpy>=1.24"
          - "opencv-contrib-python>=4.8.0"
          - "pyrealsense2"
          - "python-osc"
          - "ultralytics"
        state: present
        virtualenv: "{{ venv_path }}"

    # ------------------------------------------------------------------
    # PRE-DOWNLOAD YOLO MODEL
    # ------------------------------------------------------------------
    - name: Pre-download YOLOv8n model weights
      become: false
      shell: |
        {{ venv_path }}/bin/python -c "from ultralytics import YOLO; YOLO('{{ yolo_model }}')"
      args:
        chdir: "{{ repo_path }}"
      register: yolo_download
      changed_when: "'Downloading' in yolo_download.stderr"

    # ------------------------------------------------------------------
    # VERIFY
    # ------------------------------------------------------------------
    - name: Verify all imports work
      become: false
      shell: |
        {{ venv_path }}/bin/python -c "
        import cv2, cv2.aruco, pyrealsense2, ultralytics
        print('opencv:', cv2.__version__)
        print('ultralytics:', ultralytics.__version__)
        print('All imports OK')
        "
      register: verify_out

    - name: Show verification output
      debug:
        msg: "{{ verify_out.stdout_lines }}"
