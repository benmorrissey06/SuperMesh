# this playbook runs the headless tracking script on all beelinks
# it kills any old versions first so they dont conflict

# command is below, but make sure to run pull_latest.yml first to get the script on there
# env ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i config/bees.ini setup/resume_tracking.yml -k -K
---
- hosts: all
  gather_facts: yes  # Required to access the SSH_CONNECTION environment variable
  vars:
    venv_path: "/home/{{ ansible_user }}/tracking_venv"
    script_path: "/home/{{ ansible_user }}/SuperMesh/concepts/headless_script.py"

  tasks:
    - name: Kill old tracking processes and free ports
      shell: |
        pkill -9 -f "headless_scr" || true
        pkill -9 -f "charuco_te" || true
        fuser -k 9003/udp || true
        fuser -k 9001/udp || true
      become: yes
      ignore_errors: yes

    - name: Brief pause to release RealSense USB locks
      pause:
        seconds: 1

    - name: Verify script exists
      stat:
        path: "{{ script_path }}"
      register: script_stat

    - name: Fail if script is missing
      fail:
        msg: "The script was not found at {{ script_path }}. Please run pull_latest.yml first."
      when: not script_stat.stat.exists

    - name: Start headless script (Resumes from saved calibration)
      shell: "nohup {{ venv_path }}/bin/python3 {{ script_path }} {{ ansible_env.SSH_CONNECTION.split(' ')[0] }} > /home/{{ ansible_user }}/headless_log.txt 2>&1 &"
      async: 10
      poll: 0
      become: no

    - name: Confirmation message
      debug:
        msg: "Tracking script launched on {{ inventory_hostname }}. Check ~/headless_log.txt for logs."