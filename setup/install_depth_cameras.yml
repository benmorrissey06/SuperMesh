---
- hosts: all
  tasks:
    - name: Ensure python3-venv is installed (Required for Ubuntu/Debian systems)
      ansible.builtin.apt:
        name: python3-venv
        state: present
        update_cache: yes
      become: yes  # This tells Ansible to use sudo for this specific step

    - name: Install tracking dependencies into a safe virtual environment
      ansible.builtin.pip:
        name:
          - "opencv-contrib-python>=4.8.0"
          - pyrealsense2
          - python-osc
        virtualenv: ~/tracking_venv
        virtualenv_command: python3 -m venv