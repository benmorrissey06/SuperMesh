# This playbook installs Python dependencies AND hardware permissions for RealSense cameras
#env ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i config/bees.ini setup/install_depth_cameras.yml -k -K
---
- hosts: all
  tasks:
    - name: Ensure python3-venv is installed
      ansible.builtin.apt:
        name: python3-venv
        state: present
        update_cache: yes
      become: yes

    - name: Install tracking dependencies into virtualenv
      ansible.builtin.pip:
        name:
          - "opencv-contrib-python>=4.8.0"
          - pyrealsense2
          - python-osc
        virtualenv: ~/tracking_venv
        virtualenv_command: python3 -m venv

    - name: Install RealSense hardware rules (udev)
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/IntelRealSense/librealsense/master/config/99-realsense-libusb.rules
        dest: /etc/udev/rules.d/99-realsense-libusb.rules
        mode: '0644'
      become: yes

    - name: Apply hardware rules
      ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
      become: yes
