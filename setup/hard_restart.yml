# this playbook runs the headless tracking script on all beelinks
# it kills any old versions first so they dont conflict

# command is below, but make sure to run pull_latest.yml first to get the script on there
# env ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i config/bees.ini setup/hard_restart.yml -k -K
---
- hosts: all
  gather_facts: yes  # Required to access the SSH_CONNECTION environment variable
  vars:
    venv_path: "/home/{{ ansible_user }}/tracking_venv"
    script_path: "/home/{{ ansible_user }}/SuperMesh/concepts/headless_script.py"

  tasks:
    - name: kill headless script processes
      shell: pkill -9 -f "headless_scr" || true
      become: yes
      ignore_errors: yes

    - name: kill charuco test processes  
      shell: pkill -9 -f "charuco_te" || true
      become: yes
      ignore_errors: yes

    - name: wait for ports to release
      pause:
        seconds: 2

    - name: free port 9003
      shell: fuser -k 9003/udp || true
      become: yes
      ignore_errors: yes

    - name: free port 9001
      shell: fuser -k 9001/udp || true
      become: yes
      ignore_errors: yes

    - name: wait after port release
      pause:
        seconds: 1

    - name: delete old calibration data (forcing re-calibration)
      file:
        path: "/home/{{ ansible_user }}/supermesh_calib.json"
        state: absent
      become: no

    - name: verify script exists
      stat:
        path: "{{ script_path }}"
      register: script_stat

    - name: fail if script is missing
      fail:
        msg: "The script was not found at {{ script_path }}. Please run pull_latest.yml first."
      when: not script_stat.stat.exists

    - name: run the headless script with dynamic Master IP
      shell: "nohup {{ venv_path }}/bin/python3 {{ script_path }} {{ ansible_env.SSH_CONNECTION.split(' ')[0] }} > /home/{{ ansible_user }}/headless_log.txt 2>&1 &"
      async: 10
      poll: 0
      become: no

    - name: check if it started okay
      debug:
        msg: "headless script is running on {{ inventory_hostname }}. check ~/headless_log.txt for logs."